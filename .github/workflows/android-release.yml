name: Android release

on:
  workflow_dispatch:
    inputs:
      build_variant:
        description: Android build variant
        required: true
        default: local
        type: choice
        options:
          - local
          - release
      release_abis:
        description: Android ABIs to include
        required: true
        default: arm64-v8a
  push:
    tags:
      - "android-v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      ANDROID_RELEASE_VARIANT: ${{ github.event_name == 'workflow_dispatch' && inputs.build_variant || 'release' }}
      ANDROID_GRADLE_ARGS: -x lintVitalRelease -x lintVitalAnalyzeRelease -x lintVitalReportRelease
      ANDROID_RELEASE_ABIS: ${{ inputs.release_abis || 'arm64-v8a' }}
      AMNEZIAWG_CLEAN: "0"
      VEX_UPLOAD_STORE_FILE: release.keystore
      VEX_UPLOAD_STORE_PASSWORD: ${{ secrets.VEX_UPLOAD_STORE_PASSWORD }}
      VEX_UPLOAD_KEY_ALIAS: ${{ secrets.VEX_UPLOAD_KEY_ALIAS }}
      VEX_UPLOAD_KEY_PASSWORD: ${{ secrets.VEX_UPLOAD_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;27.1.12297006" "cmake;3.22.1"

      - name: Install dependencies
        run: npm ci

      - name: Restore Android native build cache
        uses: actions/cache@v4
        with:
          path: |
            external/amnezia
            android/.gradle
            android/app/.cxx
            android/app/build
          key: android-native-${{ runner.os }}-${{ hashFiles('package-lock.json', 'android/**/*.gradle', 'android/**/*.properties', 'patches/amnezia/*.patch', 'scripts/bootstrap_amneziawg_android.sh', 'scripts/build_android_release.sh') }}
          restore-keys: |
            android-native-${{ runner.os }}-

      - name: Restore Android release keystore
        if: env.ANDROID_RELEASE_VARIANT == 'release'
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          for name in ANDROID_RELEASE_KEYSTORE_BASE64 VEX_UPLOAD_STORE_PASSWORD VEX_UPLOAD_KEY_ALIAS VEX_UPLOAD_KEY_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "missing required secret: ${name}" >&2
              exit 2
            fi
          done
          printf '%s' "${ANDROID_RELEASE_KEYSTORE_BASE64}" | base64 --decode > android/app/release.keystore

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Build Android APK
        run: npm run android:release

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: vex-android-${{ env.ANDROID_RELEASE_VARIANT }}
          path: dist/android/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/android/*
          fail_on_unmatched_files: true
