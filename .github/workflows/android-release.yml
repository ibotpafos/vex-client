name: Android release

on:
  workflow_dispatch:
    inputs:
      release_abis:
        description: Android ABIs to include
        required: true
        default: arm64-v8a,armeabi-v7a
  push:
    tags:
      - "android-v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      ANDROID_RELEASE_ABIS: ${{ inputs.release_abis || 'arm64-v8a,armeabi-v7a' }}
      VEX_UPLOAD_STORE_FILE: release.keystore
      VEX_UPLOAD_STORE_PASSWORD: ${{ secrets.VEX_UPLOAD_STORE_PASSWORD }}
      VEX_UPLOAD_KEY_ALIAS: ${{ secrets.VEX_UPLOAD_KEY_ALIAS }}
      VEX_UPLOAD_KEY_PASSWORD: ${{ secrets.VEX_UPLOAD_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;27.1.12297006" "cmake;3.22.1"

      - name: Install dependencies
        run: npm ci

      - name: Restore Android release keystore
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          for name in ANDROID_RELEASE_KEYSTORE_BASE64 VEX_UPLOAD_STORE_PASSWORD VEX_UPLOAD_KEY_ALIAS VEX_UPLOAD_KEY_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "missing required secret: ${name}" >&2
              exit 2
            fi
          done
          printf '%s' "${ANDROID_RELEASE_KEYSTORE_BASE64}" | base64 --decode > android/app/release.keystore

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Build Android release
        run: npm run android:release

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: vex-android-release
          path: dist/android/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/android/*
          fail_on_unmatched_files: true
