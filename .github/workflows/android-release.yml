name: Android release

on:
  workflow_dispatch:
    inputs:
      build_variant:
        description: Android build variant
        required: true
        default: local
        type: choice
        options:
          - local
          - release
      release_abis:
        description: Android ABIs to include
        required: true
        default: arm64-v8a
  push:
    tags:
      - "android-v*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      ANDROID_RELEASE_VARIANT: ${{ github.event_name == 'workflow_dispatch' && inputs.build_variant || 'release' }}
      ANDROID_GRADLE_ARGS: -x lintVitalRelease -x lintVitalAnalyzeRelease -x lintVitalReportRelease
      ANDROID_RELEASE_ABIS: ${{ inputs.release_abis || 'arm64-v8a' }}
      AMNEZIAWG_CLEAN: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.4"
          cache: false

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: platform-tools

      - name: Restore Android SDK package cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/platforms/android-36
            ${{ env.ANDROID_HOME }}/build-tools/36.0.0
            ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
            ${{ env.ANDROID_HOME }}/ndk/27.1.12297006
            ${{ env.ANDROID_HOME }}/cmake/3.22.1
          key: android-sdk-${{ runner.os }}-api36-bt36-ndk270-ndk271-cmake3221
          restore-keys: |
            android-sdk-${{ runner.os }}-

      - name: Install Android build tools
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;27.0.12077973" "ndk;27.1.12297006" "cmake;3.22.1"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Restore Expo bundler cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.expo
            .expo
            node_modules/.cache
          key: expo-cache-${{ runner.os }}-${{ hashFiles('package-lock.json', 'app.json', 'app.config.*', 'metro.config.*', 'babel.config.*') }}
          restore-keys: |
            expo-cache-${{ runner.os }}-

      - name: Restore AmneziaWG Go cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/golang
          key: android-amnezia-go-${{ runner.os }}-${{ hashFiles('patches/amnezia/*.patch', 'scripts/bootstrap_amneziawg_android.sh') }}
          restore-keys: |
            android-amnezia-go-${{ runner.os }}-

      - name: Restore AmneziaWG source cache
        uses: actions/cache@v4
        with:
          path: |
            external/amnezia
          key: android-amnezia-source-${{ runner.os }}-${{ hashFiles('patches/amnezia/*.patch', 'scripts/bootstrap_amneziawg_android.sh') }}
          restore-keys: |
            android-amnezia-source-${{ runner.os }}-

      - name: Restore Android project build cache
        uses: actions/cache@v4
        with:
          path: |
            android/.gradle
            android/build
            android/app/.cxx
            android/app/build
          key: android-project-v2-${{ runner.os }}-${{ env.ANDROID_RELEASE_VARIANT }}-${{ env.ANDROID_RELEASE_ABIS }}-${{ hashFiles('package-lock.json', 'android/**/*.gradle', 'android/**/*.properties', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            android-project-v2-${{ runner.os }}-${{ env.ANDROID_RELEASE_VARIANT }}-${{ env.ANDROID_RELEASE_ABIS }}-
            android-project-v2-${{ runner.os }}-${{ env.ANDROID_RELEASE_VARIANT }}-
            android-project-v2-${{ runner.os }}-

      - name: Restore Android release keystore
        if: env.ANDROID_RELEASE_VARIANT == 'release'
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          VEX_UPLOAD_STORE_FILE: release.keystore
          VEX_UPLOAD_STORE_PASSWORD: ${{ secrets.VEX_UPLOAD_STORE_PASSWORD }}
          VEX_UPLOAD_KEY_ALIAS: ${{ secrets.VEX_UPLOAD_KEY_ALIAS }}
          VEX_UPLOAD_KEY_PASSWORD: ${{ secrets.VEX_UPLOAD_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for name in ANDROID_RELEASE_KEYSTORE_BASE64 VEX_UPLOAD_STORE_PASSWORD VEX_UPLOAD_KEY_ALIAS VEX_UPLOAD_KEY_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "missing required secret: ${name}" >&2
              exit 2
            fi
          done
          printf '%s' "${ANDROID_RELEASE_KEYSTORE_BASE64}" | base64 --decode > android/app/release.keystore

      - name: Generate Android debug keystore
        if: env.ANDROID_RELEASE_VARIANT != 'release'
        run: |
          set -euo pipefail
          if [ -f android/app/debug.keystore ]; then
            exit 0
          fi
          keytool -genkeypair -v \
            -storetype JKS \
            -keystore android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Build Android APK
        env:
          VEX_UPLOAD_STORE_FILE: ${{ env.ANDROID_RELEASE_VARIANT == 'release' && 'release.keystore' || '' }}
          VEX_UPLOAD_STORE_PASSWORD: ${{ env.ANDROID_RELEASE_VARIANT == 'release' && secrets.VEX_UPLOAD_STORE_PASSWORD || '' }}
          VEX_UPLOAD_KEY_ALIAS: ${{ env.ANDROID_RELEASE_VARIANT == 'release' && secrets.VEX_UPLOAD_KEY_ALIAS || '' }}
          VEX_UPLOAD_KEY_PASSWORD: ${{ env.ANDROID_RELEASE_VARIANT == 'release' && secrets.VEX_UPLOAD_KEY_PASSWORD || '' }}
        run: npm run android:release

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: vex-android-${{ env.ANDROID_RELEASE_VARIANT }}
          path: dist/android/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/android/*
          fail_on_unmatched_files: true
