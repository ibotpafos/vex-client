name: macOS release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional macOS release version override
        required: false
        default: ""
  push:
    tags:
      - "macos-v*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    env:
      MACOS_RELEASE_VERSION: ${{ inputs.version || '' }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      TAURI_SIGNING_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Restore Rust build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: macos-cargo-v2-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml', 'src-tauri/src/**/*.rs') }}
          restore-keys: |
            macos-cargo-v2-${{ runner.os }}-

      - name: Restore macOS native resource cache
        uses: actions/cache@v4
        with:
          path: |
            external/amnezia
            ~/Library/Caches/go-build
            src-tauri/resources/amneziawg-go
            src-tauri/resources/awg
            src-tauri/resources/vex-helper
            src-tauri/.vex-stamps
            src-tauri/target/.vex-stamps
          key: macos-native-resources-${{ runner.os }}-${{ hashFiles('patches/amnezia/*.patch', 'scripts/bootstrap_amneziawg_macos.sh', 'scripts/build_universal_resources.sh', 'scripts/build_helper.sh', 'src-tauri/Cargo.lock', 'src-tauri/Cargo.toml', 'src-tauri/src/**/*.rs') }}
          restore-keys: |
            macos-native-resources-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Rust check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build macOS release
        run: npm run macos:release

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: vex-macos-release
          path: dist/macos/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/macos/*
          fail_on_unmatched_files: true
