name: macOS native release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Native macOS release version, for example 0.1.38
        required: true
        default: ""
      build:
        description: Native macOS numeric build, for example 38
        required: true
        default: ""
  push:
    tags:
      - "macos-native-v*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    env:
      VEX_SPARKLE_PUBLIC_ED_KEY: ${{ secrets.VEX_SPARKLE_PUBLIC_ED_KEY }}
      VEX_SPARKLE_PRIVATE_ED_KEY: ${{ secrets.VEX_SPARKLE_PRIVATE_ED_KEY }}
      VEX_SPARKLE_KEY_ACCOUNT: app.vex.vpn.native
      VEX_SPARKLE_DOWNLOAD_URL_PREFIX: https://vexguard.app/downloads/native-macos/
      VEX_SPARKLE_PRODUCTION: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Resolve release version
        shell: bash
        run: |
          set -euo pipefail
          version="${{ github.event.inputs.version || '' }}"
          build="${{ github.event.inputs.build || '' }}"
          if [[ -z "${version}" && "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == macos-native-v* ]]; then
            version="${GITHUB_REF_NAME#macos-native-v}"
          fi
          if [[ -z "${build}" ]]; then
            build="${GITHUB_RUN_NUMBER}"
          fi
          if [[ -z "${version}" || ! "${build}" =~ ^[0-9]+$ ]]; then
            echo "Set workflow inputs version and numeric build, or push a macos-native-v* tag." >&2
            exit 2
          fi
          {
            echo "VEX_NATIVE_VERSION=${version}"
            echo "VEX_NATIVE_BUILD=${build}"
            echo "VEX_SPARKLE_PRIVATE_ED_KEY_FILE=${RUNNER_TEMP}/sparkle-private-ed-key"
          } >> "${GITHUB_ENV}"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Swift tests
        run: swift test --package-path macos-native

      - name: Write Sparkle signing key
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${VEX_SPARKLE_PUBLIC_ED_KEY}" || -z "${VEX_SPARKLE_PRIVATE_ED_KEY}" ]]; then
            echo "VEX_SPARKLE_PUBLIC_ED_KEY and VEX_SPARKLE_PRIVATE_ED_KEY secrets are required." >&2
            exit 2
          fi
          printf '%s\n' "${VEX_SPARKLE_PRIVATE_ED_KEY}" > "${VEX_SPARKLE_PRIVATE_ED_KEY_FILE}"
          chmod 0600 "${VEX_SPARKLE_PRIVATE_ED_KEY_FILE}"

      - name: Build native macOS release
        run: |
          npm run native:macos:internal-release
          bash scripts/prepare_native_macos_deploy_bundle.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: vex-native-macos-release
          path: dist/native-macos/deploy/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/native-macos/deploy/*
          fail_on_unmatched_files: true
