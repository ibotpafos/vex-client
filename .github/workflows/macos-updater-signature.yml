name: macOS updater signature

on:
  workflow_dispatch:
    inputs:
      version:
        description: Desktop version to sign
        required: true
        default: 0.1.29
      tarball_url:
        description: Published VEX.app.tar.gz URL
        required: true
        default: https://vexguard.app/downloads/Vex-macOS-0.1.29.app.tar.gz

permissions:
  contents: read

jobs:
  sign:
    runs-on: ubuntu-24.04
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      TAURI_SIGNING_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate signing key contract
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const config = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8"));
          const configured = config?.plugins?.updater?.pubkey;
          const secret = process.env.TAURI_SIGNING_PUBLIC_KEY;
          if (!configured) throw new Error("src-tauri/tauri.conf.json has no updater pubkey");
          if (!secret) throw new Error("TAURI_SIGNING_PUBLIC_KEY secret is missing");
          if (configured !== secret) {
            throw new Error("TAURI_SIGNING_PUBLIC_KEY does not match the updater pubkey in tauri.conf.json");
          }
          NODE

      - name: Sign published updater tarball
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          tarball="Vex-macOS-${version}.app.tar.gz"
          signature="${tarball}.sig"
          curl -fsSL "${{ inputs.tarball_url }}" -o "${tarball}"
          sha256sum "${tarball}" >"${tarball}.sha256"
          sign_output="$(npm exec --yes --package @tauri-apps/cli@2.11.2 -- tauri signer sign "${tarball}")"
          if [[ -f "${signature}" ]]; then
            :
          else
            printf '%s\n' "${sign_output}" | awk '
              /^Signature:$/ { capture = 1; next }
              capture && NF { print; found = 1; exit }
              END { exit found ? 0 : 1 }
            ' >"${signature}" || {
              printf '%s\n' "${sign_output}" >"${signature}"
            }
          fi
          test -s "${signature}"

      - name: Upload signature artifact
        uses: actions/upload-artifact@v4
        with:
          name: vex-macos-updater-signature-${{ inputs.version }}
          path: |
            Vex-macOS-${{ inputs.version }}.app.tar.gz.sha256
            Vex-macOS-${{ inputs.version }}.app.tar.gz.sig
          if-no-files-found: error
