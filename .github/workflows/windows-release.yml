name: Windows release

on:
  workflow_dispatch:
    inputs:
      target:
        description: Rust target triple
        required: true
        default: x86_64-pc-windows-msvc
  push:
    tags:
      - "windows-v*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    env:
      WINDOWS_TARGET: ${{ inputs.target || 'x86_64-pc-windows-msvc' }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      TAURI_SIGNING_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.WINDOWS_TARGET }}

      - name: Restore Rust build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: windows-cargo-${{ runner.os }}-${{ env.WINDOWS_TARGET }}-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml', 'src-tauri/src/**/*.rs') }}
          restore-keys: |
            windows-cargo-${{ runner.os }}-${{ env.WINDOWS_TARGET }}-
            windows-cargo-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Rust check
        run: cargo check --manifest-path src-tauri/Cargo.toml --target $env:WINDOWS_TARGET

      - name: Build Windows release
        shell: pwsh
        run: npm run windows:release

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: vex-windows-release
          path: dist/windows/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/windows/*
          fail_on_unmatched_files: true
