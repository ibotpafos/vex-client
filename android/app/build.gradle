apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

def projectRoot = rootDir.getAbsoluteFile().getParentFile().getAbsolutePath()

def optionalApplicationIdSuffix() {
    return findProperty('VEX_DEBUG_APPLICATION_ID_SUFFIX') ?: System.getenv('VEX_DEBUG_APPLICATION_ID_SUFFIX') ?: ''
}

def vexBuildValue(String name, String fallback = '') {
    return (findProperty(name) ?: System.getenv(name) ?: fallback).toString()
}

def vexAndroidApplicationId() {
    return vexBuildValue('VEX_ANDROID_APPLICATION_ID', 'com.vexguard.app')
}

def buildConfigString(String value) {
    return '"' + value.replace('\\', '\\\\').replace('"', '\\"') + '"'
}

def vexOtaProvider() {
    return vexBuildValue('VEX_OTA_PROVIDER', 'expo-open-ota')
}

def vexUpdatesEnabled() {
    def enabled = vexBuildValue('VEX_UPDATES_ENABLED', 'false')
    return enabled == '1' && vexUpdatesUrl() ? 'true' : 'false'
}

def vexUpdatesUrl() {
    def configuredUrl = vexBuildValue('VEX_OTA_UPDATE_URL', '')
    if (configuredUrl) {
        return configuredUrl
    }

    def projectId = vexBuildValue('VEX_EAS_PROJECT_ID', vexBuildValue('EXPO_PUBLIC_EAS_PROJECT_ID', ''))
    if (vexOtaProvider() == 'eas') {
        return projectId ? "https://u.expo.dev/${projectId}" : ''
    }

    return 'https://updates.vexguard.app/manifest'
}

def vexUpdatesRequestHeaders() {
    def channel = vexBuildValue('EXPO_PUBLIC_VEX_UPDATE_CHANNEL', vexBuildValue('EXPO_PUBLIC_VEX_RELEASE_CHANNEL', 'production'))
    return "{\"expo-channel-name\":\"${channel}\"}"
}

def vexUpdatesCodeSigningCertificate() {
    if (!vexUpdatesEnabled().toBoolean() || vexUpdatesUrl().contains('expo.dev')) {
        return ''
    }

    def certificatePath = vexBuildValue('VEX_OTA_CODE_SIGNING_CERTIFICATE', './certs/certificate.pem')
    if (!certificatePath) {
        return ''
    }

    def certificateFile = new File(certificatePath)
    if (!certificateFile.isAbsolute()) {
        certificateFile = new File(rootDir.getParentFile(), certificatePath)
    }
    return certificateFile.exists() ? certificateFile.getText('UTF-8') : ''
}

def vexUpdatesCodeSigningMetadata() {
    return vexUpdatesCodeSigningCertificate() ? '{"keyid":"main","alg":"rsa-v1_5-sha256"}' : ''
}

def localSigningProperties = new Properties()
def localSigningPropertiesFile = rootProject.file("local-signing.properties")
if (localSigningPropertiesFile.exists()) {
    localSigningPropertiesFile.withInputStream { localSigningProperties.load(it) }
}

def signingValue = { String key ->
    return findProperty(key) ?: System.getenv(key) ?: localSigningProperties.getProperty(key)
}

def hasReleaseSigningCredentials = {
    return signingValue('VEX_UPLOAD_STORE_FILE') &&
        signingValue('VEX_UPLOAD_STORE_PASSWORD') &&
        signingValue('VEX_UPLOAD_KEY_ALIAS') &&
        signingValue('VEX_UPLOAD_KEY_PASSWORD')
}

def hasLocalSigningCredentials = {
    return signingValue('VEX_LOCAL_STORE_FILE') &&
        signingValue('VEX_LOCAL_STORE_PASSWORD') &&
        signingValue('VEX_LOCAL_KEY_ALIAS') &&
        signingValue('VEX_LOCAL_KEY_PASSWORD')
}

def localBuildSigningConfig = {
    if (hasReleaseSigningCredentials()) {
        return android.signingConfigs.release
    }
    if (hasLocalSigningCredentials()) {
        return android.signingConfigs.localClean
    }
    return android.signingConfigs.debug
}

if (file("google-services.json").exists() && !optionalApplicationIdSuffix() && vexAndroidApplicationId() == 'com.vexguard.app') {
    apply plugin: "com.google.gms.google-services"
}

def applyOptionalApplicationIdSuffix(buildType) {
    def suffix = optionalApplicationIdSuffix()
    if (suffix) {
        buildType.applicationIdSuffix suffix.toString()
        buildType.versionNameSuffix suffix.toString()
    }
}

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    entryFile = file(["node", "-e", "require('expo/scripts/resolveAppEntry')", projectRoot, "android", "absolute"].execute(null, rootDir).text.trim())
    reactNativeDir = new File(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim()).getParentFile().getAbsoluteFile()
    hermesCommand = new File(["node", "--print", "require.resolve('hermes-compiler/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim()).getParentFile().getAbsolutePath() + "/hermesc/%OS-BIN%/hermesc"
    codegenDir = new File(["node", "--print", "require.resolve('@react-native/codegen/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim()).getParentFile().getAbsoluteFile()

    enableBundleCompression = (findProperty('android.enableBundleCompression') ?: false).toBoolean()
    // Use Expo CLI to bundle the app, this ensures the Metro config
    // works correctly with Expo projects.
    cliFile = new File(["node", "--print", "require.resolve('@expo/cli', { paths: [require.resolve('expo/package.json')] })"].execute(null, rootDir).text.trim())
    bundleCommand = "export:embed"

    /* Folders */
     //   The root of your project, i.e. where "package.json" lives. Default is '../..'
    // root = file("../../")
    //   The folder where the react-native NPM package is. Default is ../../node_modules/react-native
    // reactNativeDir = file("../../node_modules/react-native")
    //   The folder where the react-native Codegen package is. Default is ../../node_modules/@react-native/codegen
    // codegenDir = file("../../node_modules/@react-native/codegen")

    /* Variants */
    //   The list of variants to that are debuggable. For those we're going to
    //   skip the bundling of the JS bundle and the assets. By default is just 'debug'.
    //   If you add flavors like lite, prod, etc. you'll have to list your debuggableVariants.
    // debuggableVariants = ["liteDebug", "prodDebug"]

    /* Bundling */
    //   A list containing the node command and its flags. Default is just 'node'.
    // nodeExecutableAndArgs = ["node"]

    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   The hermes compiler command to run. By default it is 'hermesc'
    // hermesCommand = "$rootDir/my-custom-hermesc/bin/hermesc"
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]

    /* Autolinking */
    autolinkLibrariesWithApp()
}

/**
 * Set this to true in release builds to optimize the app using [R8](https://developer.android.com/topic/performance/app-optimization/enable-app-optimization).
 */
def enableMinifyInReleaseBuilds = (findProperty('android.enableMinifyInReleaseBuilds') ?: false).toBoolean()

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = 'org.webkit:android-jsc-intl:+'`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion

    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace 'com.vexguard.app'
    defaultConfig {
        applicationId vexAndroidApplicationId()
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1004951
        versionName "1.0.49"
        manifestPlaceholders = [
            vexRuntimeVersion: vexBuildValue('VEX_RUNTIME_VERSION', "1.0.49"),
            vexUpdatesEnabled: vexUpdatesEnabled(),
            vexUpdatesUrl: vexUpdatesUrl(),
            vexUpdatesRequestHeaders: vexUpdatesRequestHeaders(),
            vexUpdatesCodeSigningCertificate: vexUpdatesCodeSigningCertificate(),
            vexUpdatesCodeSigningMetadata: vexUpdatesCodeSigningMetadata(),
        ]

        buildConfigField "String", "REACT_NATIVE_RELEASE_LEVEL", "\"${findProperty('reactNativeReleaseLevel') ?: 'stable'}\""
        buildConfigField "String", "SENTRY_DSN", buildConfigString(vexBuildValue('EXPO_PUBLIC_SENTRY_DSN', ''))
        buildConfigField "String", "SENTRY_ENVIRONMENT", buildConfigString(vexBuildValue('EXPO_PUBLIC_SENTRY_ENVIRONMENT', 'production'))
        buildConfigField "String", "SENTRY_RELEASE", buildConfigString(vexBuildValue('EXPO_PUBLIC_SENTRY_RELEASE', vexBuildValue('VEX_RUNTIME_VERSION', '1.0.48')))
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            def releaseStoreFile = signingValue('VEX_UPLOAD_STORE_FILE')
            def releaseStorePassword = signingValue('VEX_UPLOAD_STORE_PASSWORD')
            def releaseKeyAlias = signingValue('VEX_UPLOAD_KEY_ALIAS')
            def releaseKeyPassword = signingValue('VEX_UPLOAD_KEY_PASSWORD')

            if (releaseStoreFile && releaseStorePassword && releaseKeyAlias && releaseKeyPassword) {
                storeFile file(releaseStoreFile)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
                enableV1Signing = true
                enableV2Signing = true
            }
        }
        localClean {
            def localStoreFile = signingValue('VEX_LOCAL_STORE_FILE')
            def localStorePassword = signingValue('VEX_LOCAL_STORE_PASSWORD')
            def localKeyAlias = signingValue('VEX_LOCAL_KEY_ALIAS')
            def localKeyPassword = signingValue('VEX_LOCAL_KEY_PASSWORD')

            if (localStoreFile && localStorePassword && localKeyAlias && localKeyPassword) {
                storeFile file(localStoreFile)
                storePassword localStorePassword
                keyAlias localKeyAlias
                keyPassword localKeyPassword
                enableV1Signing = true
                enableV2Signing = true
            }
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            applyOptionalApplicationIdSuffix(delegate)
        }
        local {
            initWith release
            matchingFallbacks = ['release']
            signingConfig localBuildSigningConfig()
            debuggable false
            def enableShrinkResources = findProperty('android.enableShrinkResourcesInLocalBuilds') ?: 'false'
            shrinkResources enableShrinkResources.toBoolean()
            def enableMinifyInLocalBuilds = findProperty('android.enableMinifyInLocalBuilds') ?: 'false'
            minifyEnabled enableMinifyInLocalBuilds.toBoolean()
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            applyOptionalApplicationIdSuffix(delegate)
        }
        release {
            signingConfig signingConfigs.release
            def enableShrinkResources = findProperty('android.enableShrinkResourcesInReleaseBuilds') ?: 'false'
            shrinkResources enableShrinkResources.toBoolean()
            minifyEnabled enableMinifyInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            def enablePngCrunchInRelease = findProperty('android.enablePngCrunchInReleaseBuilds') ?: 'true'
            crunchPngs enablePngCrunchInRelease.toBoolean()
        }
    }
    packagingOptions {
        jniLibs {
            def enableLegacyPackaging = findProperty('expo.useLegacyPackaging') ?: 'false'
            useLegacyPackaging enableLegacyPackaging.toBoolean()
        }
    }
    androidResources {
        ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:!CVS:!thumbs.db:!picasa.ini:!*~'
    }
}

gradle.taskGraph.whenReady { graph ->
    def hasReleaseTask = graph.allTasks.any { task ->
        task.project == project && task.name.toLowerCase() in [
            "assemblerelease",
            "bundlerelease",
            "installrelease",
            "packagerelease",
        ]
    }
    if (hasReleaseTask && android.signingConfigs.release.storeFile == null) {
        throw new GradleException("Release build requires VEX_UPLOAD_STORE_FILE, VEX_UPLOAD_STORE_PASSWORD, VEX_UPLOAD_KEY_ALIAS, and VEX_UPLOAD_KEY_PASSWORD.")
    }
}

// Apply static values from `gradle.properties` to the `android.packagingOptions`
// Accepts values in comma delimited lists, example:
// android.packagingOptions.pickFirsts=/LICENSE,**/picasa.ini
["pickFirsts", "excludes", "merges", "doNotStrip"].each { prop ->
    // Split option: 'foo,bar' -> ['foo', 'bar']
    def options = (findProperty("android.packagingOptions.$prop") ?: "").split(",");
    // Trim all elements in place.
    for (i in 0..<options.size()) options[i] = options[i].trim();
    // `[] - ""` is essentially `[""].filter(Boolean)` removing all empty strings.
    options -= ""

    if (options.length > 0) {
        println "android.packagingOptions.$prop += $options ($options.length)"
        // Ex: android.packagingOptions.pickFirsts += '**/SCCS/**'
        options.each {
            android.packagingOptions[prop] += it
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")
    implementation("androidx.core:core-ktx:1.12.0")
    implementation(platform("com.google.firebase:firebase-bom:34.7.0"))
    implementation("com.google.firebase:firebase-messaging")
    implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3")
    implementation project(":amneziawg-tunnel")

    def isGifEnabled = (findProperty('expo.gif.enabled') ?: "") == "true";
    def isWebpEnabled = (findProperty('expo.webp.enabled') ?: "") == "true";
    def isWebpAnimatedEnabled = (findProperty('expo.webp.animated') ?: "") == "true";

    if (isGifEnabled) {
        // For animated gif support
        implementation("com.facebook.fresco:animated-gif:${expoLibs.versions.fresco.get()}")
    }

    if (isWebpEnabled) {
        // For webp support
        implementation("com.facebook.fresco:webpsupport:${expoLibs.versions.fresco.get()}")
        if (isWebpAnimatedEnabled) {
            // Animated webp support
            implementation("com.facebook.fresco:animated-webp:${expoLibs.versions.fresco.get()}")
        }
    }

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
