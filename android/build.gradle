// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('com.google.gms:google-services:4.4.4')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

def vexFastAndroidAbis() {
  def value = (findProperty("VEX_ANDROID_FAST_ABI") ?: System.getenv("VEX_ANDROID_FAST_ABI") ?: "").toString()
  return value.split(",").collect { it.trim() }.findAll { it }
}

def configureVexFastAndroidAbis(androidExtension) {
  def abis = vexFastAndroidAbis()
  if (abis.isEmpty()) {
    return
  }
  androidExtension.defaultConfig {
    ndk {
      abiFilters(*abis)
    }
  }
}

subprojects { subproject ->
  subproject.plugins.withId("com.android.application") {
    subproject.android {
      configureVexFastAndroidAbis(delegate)
    }
  }

  if (subproject.name == "amneziawg-tunnel") {
    subproject.plugins.withId("com.android.library") {
      subproject.android {
        buildToolsVersion rootProject.ext.buildToolsVersion
        compileSdk rootProject.ext.compileSdkVersion
        ndkVersion rootProject.ext.ndkVersion

        defaultConfig {
          minSdkVersion rootProject.ext.minSdkVersion
        }
        configureVexFastAndroidAbis(delegate)
      }
    }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
